const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
let tx = 0, ty = 0, scale = 0.72;
let dragging = false, lx = 0, ly = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  draw();
}
window.addEventListener('resize', resize);

canvas.addEventListener('mousedown', e => { dragging = true; lx = e.clientX; ly = e.clientY; canvas.style.cursor='grabbing'; });
canvas.addEventListener('mouseup', () => { dragging = false; canvas.style.cursor='grab'; });
canvas.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx += e.clientX - lx; ty += e.clientY - ly;
  lx = e.clientX; ly = e.clientY; draw();
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const f = e.deltaY < 0 ? 1.1 : 0.9;
  const mx = e.clientX - tx, my = e.clientY - ty;
  scale *= f; tx = e.clientX - mx * f; ty = e.clientY - my * f;
  draw();
}, { passive: false });

function doZoom(f) {
  const mx = W/2 - tx, my = H/2 - ty;
  scale *= f; tx = W/2 - mx*f; ty = H/2 - my*f; draw();
}
function resetView() { scale = 0.72; tx = 20; ty = 20; draw(); }

// ─── DRAWING ─────────────────────────────────────────────────────────────────

function nodeById(id) { return nodes.find(n => n.id === id); }

function nodeEdgePoint(n, side) {
  if (side === 'right')  return [n.x + n.w,     n.y + n.h/2];
  if (side === 'left')   return [n.x,            n.y + n.h/2];
  if (side === 'top')    return [n.x + n.w/2,    n.y];
  return                        [n.x + n.w/2,    n.y + n.h];  // 'bottom' default
}

const ARROW_COLORS = {
  default: '#484f58',
  green:   '#2ea043',
  red:     '#f85149',
  blue:    '#388bfd',
  cyan:    '#39c5cf',
  patch:   '#bc8cff',
  yellow:  '#e3b341',
};

function arrowTip(ctx, x, y, angle, col, size) {
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x - size*Math.cos(angle-0.38), y - size*Math.sin(angle-0.38));
  ctx.lineTo(x - size*Math.cos(angle+0.38), y - size*Math.sin(angle+0.38));
  ctx.closePath();
  ctx.fill();
}

function drawArrowFull(e) {
  const fn = nodeById(e.from), tn = nodeById(e.to);
  if (!fn || !tn) return;
  const fs = e.fromSide || 'bottom';
  const ts = e.toSide   || 'top';
  const [x1,y1] = nodeEdgePoint(fn, fs);
  const [x2,y2] = nodeEdgePoint(tn, ts);
  const col = ARROW_COLORS[e.color] || ARROW_COLORS.default;

  ctx.save();
  ctx.strokeStyle = col;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([]);

  // Determine route and tip angle
  let tipAngle;
  ctx.beginPath();

  const dx = Math.abs(x2-x1), dy = Math.abs(y2-y1);

  if (dx < 4) {
    // straight vertical
    ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
    tipAngle = y2 > y1 ? Math.PI/2 : -Math.PI/2;
  } else if (dy < 4) {
    // straight horizontal
    ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
    tipAngle = x2 > x1 ? 0 : Math.PI;
  } else if (fs === 'right' && ts === 'left') {
    // horizontal L-route
    const mx = (x1+x2)/2;
    ctx.moveTo(x1,y1); ctx.lineTo(mx,y1); ctx.lineTo(mx,y2); ctx.lineTo(x2,y2);
    tipAngle = x2 > x1 ? 0 : Math.PI;
  } else if (fs === 'bottom' && ts === 'top') {
    // vertical T-route
    const my = (y1+y2)/2;
    ctx.moveTo(x1,y1); ctx.lineTo(x1,my); ctx.lineTo(x2,my); ctx.lineTo(x2,y2);
    tipAngle = Math.PI/2;
  } else if (fs === 'bottom' && ts === 'left') {
    ctx.moveTo(x1,y1); ctx.lineTo(x1,y2); ctx.lineTo(x2,y2);
    tipAngle = x2 > x1 ? 0 : Math.PI;
  } else if (fs === 'right' && ts === 'top') {
    ctx.moveTo(x1,y1); ctx.lineTo(x2,y1); ctx.lineTo(x2,y2);
    tipAngle = Math.PI/2;
  } else {
    ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
    tipAngle = Math.atan2(y2-y1, x2-x1);
  }
  ctx.stroke();
  arrowTip(ctx, x2, y2, tipAngle, col, 9);

  if (e.label) {
    ctx.fillStyle = col;
    ctx.font = `bold 10px Consolas, monospace`;
    ctx.textAlign = 'center';
    // Place label near midpoint, offset perpendicular
    let lx = (x1+x2)/2, ly = (y1+y2)/2 - 4;
    if (dx < 4) lx += 28;   // vertical arrow: label to the right
    ctx.fillText(e.label, lx, ly);
  }
  ctx.restore();
}

function drawDiamond(x, y, w, h, col) {
  const cx = x+w/2, cy = y+h/2;
  ctx.beginPath();
  ctx.moveTo(cx, y); ctx.lineTo(x+w, cy); ctx.lineTo(cx, y+h); ctx.lineTo(x, cy);
  ctx.closePath();
  ctx.fillStyle = col.fill; ctx.fill();
  ctx.strokeStyle = col.stroke; ctx.lineWidth = 1.5; ctx.stroke();
}

// polyfill-safe rounded rect
function drawRoundRect(x, y, w, h, r, col) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);  ctx.arcTo(x+w, y,   x+w, y+r,   r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h);  ctx.arcTo(x,   y+h, x,   y+h-r, r);
  ctx.lineTo(x, y+r);    ctx.arcTo(x,   y,   x+r, y,     r);
  ctx.closePath();
  ctx.fillStyle = col.fill; ctx.fill();
  if (col.dash) ctx.setLineDash([4,3]);
  ctx.strokeStyle = col.stroke; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.setLineDash([]);
}

function wrapText(text, maxWidth, fontSize) {
  const words = text.split(' ');
  const lines = [];
  let cur = '';
  for (const w of words) {
    const test = cur ? cur + ' ' + w : w;
    if (ctx.measureText(test).width > maxWidth && cur) {
      lines.push(cur); cur = w;
    } else { cur = test; }
  }
  if (cur) lines.push(cur);
  return lines;
}

function drawNode(n) {
  const col = COLORS[n.type] || COLORS.process;

  if (n.type === 'decision') {
    drawDiamond(n.x, n.y, n.w, n.h, col);
    ctx.fillStyle = col.text;
    ctx.font = `bold 10px Consolas, monospace`;
    ctx.textAlign = 'center';
    const lines = n.lines.join('\n').split('\n');
    const lineH = 13;
    const startY = n.y + n.h/2 - (lines.length-1)*lineH/2;
    lines.forEach((l,i) => ctx.fillText(l, n.x+n.w/2, startY + i*lineH));
  } else {
    drawRoundRect(n.x, n.y, n.w, n.h, 5, col);

    // Main text
    ctx.fillStyle = col.text;
    ctx.font = `bold 10.5px Consolas, monospace`;
    ctx.textAlign = 'left';
    const pad = 8;
    const maxW = n.w - pad*2;

    let allLines = [];
    for (const line of n.lines) {
      const wrapped = wrapText(line, maxW, 10.5);
      allLines = allLines.concat(wrapped);
    }

    const lineH = 13;
    const subLines = n.sub ? n.sub.split('\n') : [];
    const totalH = allLines.length * lineH + (subLines.length > 0 ? 6 + subLines.length * 11 : 0);
    let startY = n.y + (n.h - totalH) / 2 + lineH;

    allLines.forEach((l, i) => {
      ctx.fillText(l, n.x + pad, startY + i * lineH);
    });

    if (subLines.length) {
      ctx.fillStyle = '#484f58';
      ctx.font = `9px Consolas, monospace`;
      const subY = startY + allLines.length * lineH + 4;
      subLines.forEach((l, i) => {
        ctx.fillText(l, n.x + pad, subY + i * 11);
      });
    }
  }
}

// ── SECTION BACKGROUNDS ───────────────────────────────────────────────────
const sections = [
  { label:'MOD INITIALIZATION',     x:30,   y:30,   w:1270, h:160, color:'#1c2128' },
  { label:'RENDER LOOP (per frame)', x:30,   y:200,  w:580,  h:1630, color:'#13161c' },
  { label:'PAWN STATE EXTRACTION',   x:620,  y:200,  w:550,  h:1400, color:'#111c14' },
  { label:'PROMPT PIPELINE',         x:1180, y:200,  w:580,  h:950,  color:'#13131c' },
  { label:'BACKEND DISPATCH',        x:1780, y:200,  w:620,  h:540,  color:'#191320' },
  { label:'POST-PROCESSING',         x:2400, y:200,  w:580,  h:320,  color:'#141c14' },
  { label:'CACHE & STORAGE',         x:2400, y:530,  w:580,  h:420,  color:'#141c14' },
  { label:'VIDEO PIPELINE  (Veo 3.1 Lite)', x:30, y:1860, w:780, h:1250, color:'#0d1820' },
  { label:'VIDEO MATTE + PLAYBACK',  x:580,  y:2340, w:500,  h:260,  color:'#0d1820' },
];

function drawSection(s) {
  const r = 8;
  ctx.beginPath();
  ctx.moveTo(s.x+r, s.y);
  ctx.lineTo(s.x+s.w-r, s.y); ctx.arcTo(s.x+s.w,s.y,    s.x+s.w,s.y+r,    r);
  ctx.lineTo(s.x+s.w, s.y+s.h-r); ctx.arcTo(s.x+s.w,s.y+s.h,s.x+s.w-r,s.y+s.h,r);
  ctx.lineTo(s.x+r, s.y+s.h); ctx.arcTo(s.x,s.y+s.h,    s.x,s.y+s.h-r,   r);
  ctx.lineTo(s.x, s.y+r); ctx.arcTo(s.x,s.y,    s.x+r,s.y,    r);
  ctx.closePath();
  ctx.fillStyle = s.color; ctx.fill();
  ctx.strokeStyle = '#21262d'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = '#3d444d';
  ctx.font = 'bold 11px Consolas, monospace';
  ctx.textAlign = 'left';
  ctx.fillText('▸ ' + s.label, s.x + 12, s.y + 16);
}

// ─── MAIN DRAW ────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(tx, ty);
  ctx.scale(scale, scale);

  // Sections
  sections.forEach(drawSection);

  // Edges (behind nodes)
  edges.forEach(drawArrowFull);

  // Nodes
  nodes.forEach(drawNode);

  ctx.restore();
}

canvas.style.cursor = 'grab';
resize();
resetView();
</script>
